title: "SURGeLLM 2026"
short_title: "SURGeLLM"
subtitle: "Structured Understanding, Retrieval, and Generation in the LLM Era"
conference: "ACL 2026"
location: "Harbor D, San Diego, California, USA"
dates: "ACL 2026 workshop day: July 3, 2026"
base_path: "/"

tagline: "First-class NLP for tables, charts, maps, flowcharts, and diagrams."
description: >-
  SURGeLLM is a workshop at ACL 2026 bringing together NLP, IR, data management, and visualization researchers to advance structure-aware understanding, retrieval, generation, and evaluation.

banner_image: "/assets/Banner_ACL26.png"
og_image: "/assets/Banner_ACL26.png"

contact_email: "surgellm@googlegroups.com"

home:
  announcement:
    pill: "Talks & Awards"
    message: '<strong class="text-highlight">Talk videos</strong> and <strong class="text-highlight">awards</strong> are now available; the full schedule and accepted papers are online.'
    link_label: "Watch Talks"
    link_url: "/program/"
  overview_title: "Workshop Hub"
  program_preview:
    - time: "08:40–12:30"
      title: "Morning Program"
      body: "Invited talks from Preslav Nakov, Dan Roth, and Hamid Palangi, plus Poster Session I and Oral Session I."
    - time: "14:00–16:10"
      title: "Afternoon Program"
      body: "Oral Session II, an invited talk from Lisa Amini, and Poster Session II."
    - time: "16:10–17:30"
      title: "Panel & Closing"
      body: "Industry panel discussion followed by Closing Remarks and Awards."
  awards_announcement:
    title: "Awards Announced"
    body: "The workshop recognized the following papers."
    items:
      - '<strong>Best Paper Award</strong>: <a href="https://aclanthology.org/2026.surgellm-1.14/" target="_blank" rel="noopener noreferrer"><em>TabBridge: Bridging Structure and Context for Accurate Table Reasoning</em></a> by Jeongwoo Lee, Eunsoo Lee, and Jihie Kim.'
      - '<strong>Best Student Paper Award</strong>: <a href="https://aclanthology.org/2026.surgellm-1.24/" target="_blank" rel="noopener noreferrer"><em>More Than Efficiency: Embedding Compression Improves Domain Adaptation in Dense Retrieval</em></a> by Chunsheng Zuo and Daniel Khashabi.'
      - '<strong>Best Student Paper Award</strong>: <a href="https://aclanthology.org/2026.surgellm-1.12/" target="_blank" rel="noopener noreferrer"><em>DSMentor: Curriculum-Guided Inference with Online Memory for Data-Science LLM Agents</em></a> by He Wang, Alexander Hanbo Li, Yiqun Hu, Sheng Zhang, Hideo Kobayashi, Jiani Zhang, Henghui Zhu, Chung-Wei Hang, and Patrick Ng.'
  cards:
    - title: "Accepted Papers"
      body: '<strong class="text-highlight">Accepted papers are posted</strong> with proceedings and non-archival categories.'
      items:
        - '<strong class="text-highlight">Proceedings/Archival</strong> and <strong class="text-highlight">Non-Archival</strong> accepted work.'
        - '<strong class="text-highlight">Poster</strong> and <strong class="text-highlight">Oral</strong> presentation labels are included.'
      link_label: "Accepted Papers"
      link_url: "/papers/"
    - title: "Speakers & Panelists"
      body: 'Meet the invited speakers and confirmed industry panelists joining SURGeLLM at ACL 2026.'
      items:
        - "Four invited speakers across the morning and afternoon program."
        - "Five panelists representing industry research and applied AI."
      link_label: "Meet the Speakers"
      link_url: "/speakers/"
    - title: "Venue"
      body: 'Join us on <strong class="text-highlight">July 3, 2026</strong> in <strong class="text-highlight">Room Harbor D</strong> at ACL 2026.'
      items:
        - "Full-day workshop in San Diego, California."
        - "All schedule times are local to ACL 2026."
      link_label: "Venue Details"
      link_url: "/venue/"

