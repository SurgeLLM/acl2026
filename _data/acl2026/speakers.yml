    linkedin: "https://www.linkedin.com/in/yunyao-li"
    photo: "/assets/people/yunyao-li.jpg"
    status: confirmed
    bio: >-
      Yunyao Li is Director of Machine Learning at Adobe Experience Platform, where she leads strategic Generative AI and knowledge graph initiatives for enterprise personalization, audience understanding, and customer journeys at scale. Previously, she led machine learning for Apple Knowledge Platform and held senior research leadership roles at IBM Research - Almaden. Her work spans scalable NLP, human-computer cooperation, declarative text understanding, enterprise search, and database usability; she has published 100+ papers and holds 36 patents.
