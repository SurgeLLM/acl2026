  - name: "Hamid Palangi"
    affiliation: "Google, UW, USA"
    url: "https://www.hamidpalangi.com/"
    scholar: "https://scholar.google.com/citations?user=B1lAghgAAAAJ&hl=en"
    photo: "/assets/people/palangi-hamid.jpg"
    status: confirmed
    bio: >-
      Dr. Hamid Palangi is a Staff Research Scientist at Google, Affiliate Associate Professor at the University of Washington and an advisor for Koidra. His work is centered around building more reliable, useful and controllable AI systems, with a specific focus on enabling foundation models and multi-agent workflows to advance AI-driven discovery and tackle complex long-horizon tasks.

panelists:
  - name: "Kamalika Das"
    affiliation: "Intuit, USA"
    linkedin: "https://www.linkedin.com/in/kamalika-das-phd-619bb23"
    photo: "/assets/people/kamalika-das.jpg"
    status: confirmed
    bio: >-
      Kamalika Das is a Principal Research Scientist and Head of AI Research at Intuit, where she focuses on LLM reasoning and reliability for accurate, trustworthy fintech applications and leads the University Collaboration Program. She has published 70+ papers in venues including KDD, NeurIPS, AAAI, and AISTATS. Previously, her climate machine learning and anomaly detection research at NASA Ames earned her the NASA Exceptional Public Service Medal, and she serves on the advisory board of the Lamarr Institute for Machine Learning and Artificial Intelligence.
  - name: "Yunyao Li"
    affiliation: "Adobe, USA"
    url: "https://yunyaoli.github.io/"
