tracks:
  - id: archival
    title: "Main Submission (Archival or Non-Archival)"
    description: "Submit new work, including work in progress. Accepted main submissions may be published in the ACL Anthology (archival) or presented without proceedings publication (non-archival), based on the choice indicated at submission."
    links:
      - label: "Direct submission (OpenReview)"
        url: "https://openreview.net/group?id=aclweb.org/ACL/2026/Workshop/SURGeLLM#tab-your-consoles"
        primary: true
      - label: "ARR commitment (OpenReview)"
        url: "https://openreview.net/group?id=aclweb.org/ACL/2026/Workshop/SURGeLLM_ARR_Commitment"
  - id: non_archival
    title: "Non-Proceedings (Non-Archival)"
    description: "Presentation-only track for cross-presentation of ACL 2026 Findings and other recently accepted work (not published in the workshop proceedings)."
    links:
      - label: "Non-archival submission form"
        url: "https://forms.gle/pStJVCU43ew4hqbs7"
        primary: true

notes:
  - "We welcome both long (up to 8 pages) and short (up to 4 pages) submissions in ACL format (excluding references and appendices)."
  - "At submission time, main-submission authors should indicate whether their paper is intended for archival publication or non-archival presentation."
  - "Direct main submissions may include new work that is still under development and does not need prior peer review."
  - "ARR-reviewed papers can be submitted via the commitment form if they have not been accepted/published elsewhere."
  - "ACL Findings / main-conference papers may request cross-presentation via the non-archival track (subject to capacity)."
  - "We welcome a broad spectrum of contributions: position papers, datasets/benchmarks, systems reports, ablations, and negative results (when well-supported)."
  - "If you rely on non-public resources (e.g., proprietary data), ensure results are responsibly summarized and compliant with ACL policies."
