{% assign person = include.person %}
{% if person.url or person.scholar or person.linkedin %}
  <div class="person__links" aria-label="Links for {{ person.name }}">
    {% if person.url %}
      <a class="link-chip link-chip--icon" href="{{ person.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ person.name }} website" title="Website">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3.6 9h16.8M3.6 15h16.8M12 3a13.5 13.5 0 0 1 0 18M12 3a13.5 13.5 0 0 0 0 18"></path>
        </svg>
        <span class="sr-only">Website</span>
      </a>
    {% endif %}
    {% if person.scholar %}
      <a class="link-chip link-chip--icon" href="{{ person.scholar }}" target="_blank" rel="noopener noreferrer" aria-label="{{ person.name }} Google Scholar" title="Google Scholar">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9.5 12 5l9 4.5-9 4.5L3 9.5Z"></path>
          <path d="M7 12v4.5c1.4 1.3 3 2 5 2s3.6-.7 5-2V12"></path>
          <path d="M21 10v5"></path>
        </svg>
        <span class="sr-only">Google Scholar</span>
      </a>
    {% endif %}
    {% if person.linkedin %}
      <a class="link-chip link-chip--icon" href="{{ person.linkedin }}" target="_blank" rel="noopener noreferrer" aria-label="{{ person.name }} LinkedIn" title="LinkedIn">
        <span class="link-chip__in" aria-hidden="true">in</span>
        <span class="sr-only">LinkedIn</span>
      </a>
    {% endif %}
  </div>
{% endif %}
